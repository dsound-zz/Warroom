# War Room Experience Corpus
# One entry per story. Target: 30-50 entries.

- id: duckdb_wasm_avandar
  title: Replacing server-side pagination with DuckDB-WASM for client-side analytics
  context: |
    Avandar Labs, frontend engineer on a small team. The product was a B2B
    analytics dashboard where users filtered and aggregated millions of rows
    of customer-level data. Stack was React + Postgres, with paginated HTTP
    queries for every filter change.
  problem: |
    Filter interactions felt broken. Changing a single facet triggered a
    round trip that returned 8 to 15 seconds later. Users routinely
    abandoned their analysis mid-session. Business stakeholders thought
    the fix was "make the API faster."
  constraints: |
    Small team, no dedicated backend person for this effort. Changing the
    database layer was out of scope. The product team wanted a fix in weeks,
    not quarters. I was frontend-leaning and this was not framed as my
    problem.
  approach: |
    Pushed back on "make the API faster" as the wrong frame. The right
    frame was "do the analytics in the browser." Prototyped DuckDB-WASM
    running in a web worker, pulling the user's full dataset once into
    memory at session start. Filter interactions became sub-100ms because
    they were local SQL, not network calls. Built a thin query layer so
    product engineers could keep writing SQL they already knew.
  outcome: |
    Interaction latency dropped from 8-15 seconds to under 100ms for
    filter changes. Initial page load went up by a few seconds (one-time
    cost to pull the dataset) and we judged the tradeoff worth it. No
    user complaints about speed after launch. Later built an LLM
    plain-language query layer on top of the same DuckDB layer so
    non-SQL users could filter.
  what_i_learned: |
    performance problems are often architecture
    problems wearing a performance costume. The "obvious" optimization
    (cache more, index more, faster API) can be an order of magnitude
    worse than reframing where the computation happens. Also: treat
    the browser as a compute target, not just a display target.
  technologies:
    - duckdb-wasm
    - react
    - typescript
    - web-workers
    - postgres
    - sql
  themes:
    - performance
    - state-architecture
    - browser-limits
    - reframing-problems
    - wasm
    - analytics
  transferable_to: |
    Staff frontend at data-heavy companies, analytics products,
    any role where client-side performance is a product differentiator.
    Hex, Observable, Tinybird, MotherDuck are direct matches.
  seniority_signal: |
    Able to reframe a problem the business stated wrong. Able to drive
    an unusual technical direction solo. Able to identify when a
    constraint is real vs cosmetic.
  caveats: |
    I did not design the original Postgres layer. I did not do the
    data pipeline work upstream. This is a frontend-and-browser-engine
    story, not a full-stack infrastructure story.
  linked_artifacts: []
