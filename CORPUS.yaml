  # Avandar LLM
  - id: avandar_llm_plain_language_query
  title: Building an LLM plain-language query layer over a DuckDB analytics engine
  context: |
    Avandar Labs, following the DuckDB-WASM migration. The analytics
    system now ran fast but still required users to write SQL (or use
    a faceted UI). Non-technical PMs and customer-facing staff could
    not self-serve.
  problem: |
    The SQL-or-facets dichotomy was limiting. Facets covered 30% of
    real questions. SQL covered 100% but excluded 80% of users. The
    long tail of "I want to ask a question that's not in the facets"
    was going to engineers as one-off tickets.
  constraints: |
    Had to layer on top of the existing DuckDB pipeline, not replace
    it. Had to be safe against SQL injection and resource exhaustion
    because LLM-generated SQL is famously dangerous. Limited team
    time and no formal eval infrastructure.
  approach: |
    Built a translation layer that took plain-language questions,
    passed them to an LLM with the schema + a few example
    question/SQL pairs in context, generated SQL, validated the SQL
    against a safelist (no DROP, LIMIT-injection, column-exists
    checks), then executed against DuckDB. Returned both the result
    and the generated SQL so users could verify and learn.
  outcome: |
    FILL THIS IN. My guess: internal users started self-serving
    analytical questions without engineering help. Engineers stopped
    getting ad-hoc SQL tickets. The "show the generated SQL" feature
    was unexpectedly popular and educational for users.
  what_i_learned: |
    LLM-generated code is safe if you treat
    the LLM as untrusted input and validate against a whitelist, not
    a blacklist.
  technologies:
    - duckdb
    - llm
    - sql
    - typescript
    - react
  themes:
    - llm-in-production
    - query-interfaces
    - self-service-analytics
    - ai-safety-validation
  transferable_to: |
    Any data product that wants natural language querying. Hot area
    right now. Hex, Observable, Tinybird, and any analytics company
    building "ask in plain English" features.
  seniority_signal: |
    Willing to ship LLM features into production with proper
    validation. Not the person who says "LLMs are unreliable so we
    shouldn't use them," not the person who says "LLMs are magic so
    we should use them everywhere."
  caveats: |
    Production usage volume I'm aware of was small. I did not build
    the guardrails against prompt injection at the input layer, only
    SQL validation at the output layer. That's a real gap.
  linked_artifacts: []
