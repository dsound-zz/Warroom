  # Beelzebub's RAG
- id: beelzebub_rag_etymology_separation
  title: Preventing RAG hallucination by architecturally separating linguistic analysis from document-grounded lookup
  context: |
    Beelzebub Explorer, solo project, ongoing. A research tool for deep
    linguistic and etymological analysis of Gurdjieff's Beelzebub's Tales
    to His Grandson. Stack: FastAPI + ChromaDB (local all-MiniLM-L6-v2
    embeddings) + Gemini 2.5 Flash backend, React/TS/Vite frontend.
  problem: |
    Early prototype conflated two different kinds of queries: "what are
    the Greek/Armenian/Sanskrit roots of this invented word" and "what
    does this character do in chapter 17." When both were answered through
    the same RAG pipeline, etymology answers started drifting into
    character details and vice versa. Worse, the LLM would confidently
    invent etymologies when the document had none.
  constraints: |
    Solo project, no budget for OpenAI embeddings, wanted local-only
    inference for privacy. Could not rely on the LLM's training data
    for etymologies because Gurdjieff's invented vocabulary is not in
    any training corpus.
  approach: |
    Split the system into two entirely separate pipelines with no shared
    context. Etymology analysis: strictly linguistic, pulls from a curated
    etymology database I built, the LLM is only asked to synthesize
    morpheme-level analysis. Character and narrative queries: pure RAG
    against ChromaDB passages, with the LLM explicitly instructed to
    refuse questions outside the retrieved context. The separation is
    enforced at the routing layer, not the prompt layer.
  outcome: |
    Hallucination rate on etymology queries dropped to near zero because
    the LLM now has no degrees of freedom to invent roots. Character
    queries became grounded in actual passages. The tradeoff: users
    can't ask "what's the etymology of the character's name" as a single
    question, they have to ask twice. I judged that tradeoff worth it.
  what_i_learned: |
    architectural separation beats prompt
    engineering for preventing hallucination. If two kinds of knowledge
    have different provenance, they should have different pipelines,
    even if the UX is slightly worse.
  technologies:
    - fastapi
    - chromadb
    - all-minilm-l6-v2
    - gemini-2.5-flash
    - rag
    - react
    - typescript
    - vite
  themes:
    - rag
    - hallucination-prevention
    - architecture-over-prompts
    - local-inference
    - llm-routing
  transferable_to: |
    Any AI/LLM company worried about grounding. Legal tech, medical,
    financial services, compliance. Also frontend roles at LLM-heavy
    shops that care about systems thinking. Langfuse, Helicone,
    Humanloop, and any company building RAG products.
  seniority_signal: |
    Able to identify when a prompt-level fix is the wrong abstraction.
    Willing to accept worse UX for better correctness. Thinks in
    pipelines, not single calls.
  caveats: |
    Solo project. Not scaled to many users. No formal evals yet,
    "near zero" is qualitative.
  linked_artifacts: []
