services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: warroom
      POSTGRES_PASSWORD: warroom
      POSTGRES_DB: warroom
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warroom -d warroom"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
